<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wydarzenia sportowe</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        nav { background: #333; padding: 10px; }
        nav a { color: white; margin-right: 10px; text-decoration: none; }
        .event { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Events</a>
    <a href="#">Contact</a>
</nav>

<h1>Wydarzenia</h1>

<div id="events"></div>

<h2>Dodaj wydarzenie</h2>

<form id="eventForm">
    <input placeholder="Sport" id="sport"><br>
    <input placeholder="Data" id="date"><br>
    <input placeholder="Godzina" id="time"><br>
    <input placeholder="Uczestnicy" id="participants"><br>
    <button type="submit">Dodaj</button>
</form>


<script>
fetch('/api/events')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('events');

        data.forEach(e => {
            const div = document.createElement('div');
            div.className = 'event';
            div.innerHTML = `
                <h3>${e.sport}</h3>
                <p>${e.date} ${e.time}</p>
                <p>${e.participants}</p>
            `;
            container.appendChild(div);
        });
    });

document.getElementById('eventForm').addEventListener('submit', e => {
    e.preventDefault();

    fetch('/api/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            sport: sport.value,
            date: date.value,
            time: time.value,
            participants: participants.value
        })
    });
});
</script>

</body>
</html>
