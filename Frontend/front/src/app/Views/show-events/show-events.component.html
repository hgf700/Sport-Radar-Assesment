<button (click)="createEventView()">
  Go to create event view
</button>

<div>
  <form
    [formGroup]="selectSingleEventForm"
    (ngSubmit)="onSubmit()"
    aria-labelledby="search-form-title"
  >
    <h2 id="search-form-title">Search event by ID</h2>

    <label for="eventId">Event ID</label>
    <input
      id="eventId"
      formControlName="eventId"
      placeholder="Insert Event ID"
      required
    />

    <button type="submit">Search single event</button>
  </form>
</div>

<main class="main">
  <table *ngIf="event.length > 0" aria-label="Event list">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Date</th>
        <th scope="col">Description</th>
        <th scope="col">Sport</th>
        <th scope="col">Home</th>
        <th scope="col">Away</th>
        <th scope="col">Venue</th>
        <th scope="col">City</th>
        <th scope="col">Link</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of event">
        <td>{{ e.id }}</td>
        <td>{{ e.dateTime | date: "yyyy-MM-dd HH:mm" }}</td>
        <td>{{ e.description }}</td>
        <td>{{ sportMap[e.sportName] }}</td>
        <td>{{ e.homeTeamName }}</td>
        <td>{{ e.awayTeamName }}</td>
        <td>{{ e.venueName }}</td>
        <td>{{ e.venueCity }}</td>
        <td>
          <a href="#" aria-label="View details">
            View
          </a>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="event.length === 0" role="status">
    No events found
  </p>
</main>

<div 
  id="eventId-error"
  *ngIf="submitted && f['eventId'].invalid"
>
  <small *ngIf="f['eventId'].errors?.['required']">
    Event ID is required
  </small>
</div>
