<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wydarzenia sportowe</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        nav { background: #333; padding: 10px; }
        nav a { color: white; margin-right: 10px; text-decoration: none; }
        .event { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <a href="createEvent.html">Create Event</a>
</nav>

<h1>Wydarzenia</h1>

<div id="events"></div>

<script>
fetch('/api/events')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('events');

        data.forEach(e => {
            const div = document.createElement('div');
            div.className = 'event';
            div.innerHTML = `
                <h3>${e.id}</h3>
                <p>${e.dateTime}</p>
                <p>${e.description}</p>
                <p>${e.sportName}</p>
                <p>${e.homeTeamName}</p>
                <p>${e.awayTeamName}</p>
                <p>${e.venueName}</p>
                <p>${e.venueCity}</p>

            `;
            container.appendChild(div);
        });
    });

document.getElementById('eventForm').addEventListener('submit', e => {
    e.preventDefault();

    fetch('/api/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            sport: sport.value,
            date: date.value,
            time: time.value,
            participants: participants.value
        })
    });
});
</script>

</body>
</html>
